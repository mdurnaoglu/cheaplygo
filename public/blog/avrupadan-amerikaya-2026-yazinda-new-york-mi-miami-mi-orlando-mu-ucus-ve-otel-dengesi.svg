<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">New York, Miami ve Orlando ucus ve otel dengesi gorseli</title>
  <desc id="desc">New York, Miami ve Orlando sehirlerini ucus ve konaklama dengesi acisindan karsilastiran temiz seyahat illusturasyonu.</desc>
  <defs>
    <linearGradient id="bg" x1="160" y1="80" x2="1420" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F6FF"/>
      <stop offset="0.52" stop-color="#FFF6E9"/>
      <stop offset="1" stop-color="#EAF7EF"/>
    </linearGradient>
    <linearGradient id="cardTop" x1="0" y1="0" x2="0" y2="1">
