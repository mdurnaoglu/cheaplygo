    <filter id="shadow" x="0" y="0" width="1600" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="28" flood-color="#1F2937" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="204" cy="186" r="118" fill="#F4D9B9" fill-opacity="0.55"/>
  <circle cx="1438" cy="182" r="104" fill="#C5D9E4" fill-opacity="0.65"/>
  <circle cx="1330" cy="758" r="164" fill="#D4E1D4" fill-opacity="0.75"/>

