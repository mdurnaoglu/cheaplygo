    <text x="156" y="174" fill="#0F172A" font-size="40" font-family="Georgia, serif" font-weight="700">One City or Two?</text>
    <text x="156" y="224" fill="#475569" font-size="26" font-family="Arial, sans-serif">Short US to Europe trip planning</text>
