    <text x="381" y="301" fill="#EFF6FF" font-size="24" font-family="Arial, sans-serif" font-weight="700">10 Nights</text>
    <text x="156" y="355" fill="#0F172A" font-size="24" font-family="Arial, sans-serif">Compare airfare, hotel changes, and transfer time.</text>
  </g>
  <path d="M558 507C693 443 833 422 955 447C1068 470 1187 528 1367 497" stroke="url(#route)" stroke-width="10" stroke-linecap="round" stroke-dasharray="15 19"/>
