    <text x="1050" y="214" fill="#9A3412" font-size="28" font-family="Arial, sans-serif" font-weight="700">One City Wins</text>
    <text x="1050" y="258" fill="#7C2D12" font-size="21" font-family="Arial, sans-serif">Better for 7 nights, fewer hotel</text>
    <text x="1050" y="291" fill="#7C2D12" font-size="21" font-family="Arial, sans-serif">changes, less transfer friction,</text>
    <text x="1050" y="324" fill="#7C2D12" font-size="21" font-family="Arial, sans-serif">more real sightseeing time.</text>
  </g>
