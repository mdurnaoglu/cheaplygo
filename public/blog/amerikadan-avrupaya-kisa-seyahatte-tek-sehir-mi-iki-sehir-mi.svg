    <rect x="1110" y="486" width="368" height="226" rx="30" stroke="#BFDBFE"/>
    <text x="1154" y="544" fill="#1D4ED8" font-size="28" font-family="Arial, sans-serif" font-weight="700">Two Cities Work</text>
    <text x="1154" y="588" fill="#1E3A8A" font-size="21" font-family="Arial, sans-serif">Best near 9 to 10 nights when</text>
    <text x="1154" y="621" fill="#1E3A8A" font-size="21" font-family="Arial, sans-serif">the pair has easy rail or short</text>
    <text x="1154" y="654" fill="#1E3A8A" font-size="21" font-family="Arial, sans-serif">flight connections.</text>
  </g>
  <g opacity="0.96">
