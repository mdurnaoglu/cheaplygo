    <rect x="392" y="546" width="152" height="110" rx="22" fill="#E6C27A"/>
    <text x="412" y="590" fill="#5B3D14" font-size="30" font-family="Georgia, serif" font-weight="700">Budapest</text>
    <text x="416" y="624" fill="#694A1D" font-size="18" font-family="Arial, sans-serif">Balanced total value</text>
    <rect x="572" y="546" width="152" height="110" rx="22" fill="#7B9FA9"/>
    <text x="608" y="590" fill="#F7FAFB" font-size="30" font-family="Georgia, serif" font-weight="700">Berlin</text>
    <text x="594" y="624" fill="#E8F1F4" font-size="18" font-family="Arial, sans-serif">Modern city depth</text>
  </g>

