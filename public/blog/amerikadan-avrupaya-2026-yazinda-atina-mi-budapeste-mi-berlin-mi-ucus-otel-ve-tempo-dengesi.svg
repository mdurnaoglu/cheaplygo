    <text x="1010" y="222" fill="#7A4D33" font-size="22" font-family="Arial, sans-serif">Athens: heat, history, summer mood</text>
    <text x="1010" y="258" fill="#7A4D33" font-size="22" font-family="Arial, sans-serif">Budapest: value, views, compact stay</text>
    <text x="1010" y="294" fill="#7A4D33" font-size="22" font-family="Arial, sans-serif">Berlin: neighborhoods, culture, scale</text>
  </g>

