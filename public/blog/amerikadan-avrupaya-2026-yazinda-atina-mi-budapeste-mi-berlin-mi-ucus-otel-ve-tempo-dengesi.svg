    <text x="1082" y="610" fill="#35515A" font-size="21" font-family="Arial, sans-serif">Transfers, hotel zone, and usable</text>
    <text x="1082" y="644" fill="#35515A" font-size="21" font-family="Arial, sans-serif">energy decide the real winner.</text>
  </g>

