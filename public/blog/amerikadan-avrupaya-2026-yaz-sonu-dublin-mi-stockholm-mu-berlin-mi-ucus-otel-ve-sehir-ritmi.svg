    <text x="146" y="160" fill="#213746" font-size="44" font-family="Georgia, serif" font-weight="700">Dublin, Stockholm, or Berlin?</text>
    <text x="146" y="214" fill="#5C6E7B" font-size="27" font-family="Arial, sans-serif">Late-summer US to Europe city choice with cleaner total value</text>
    <rect x="146" y="258" width="176" height="58" rx="18" fill="#1F7082"/>
    <text x="188" y="295" fill="#F4FBFD" font-size="24" font-family="Arial, sans-serif" font-weight="700">Late Summer</text>
    <rect x="338" y="258" width="174" height="58" rx="18" fill="#CA7340"/>
    <text x="374" y="295" fill="#FFF8F3" font-size="24" font-family="Arial, sans-serif" font-weight="700">Hotel Logic</text>
    <text x="146" y="362" fill="#243746" font-size="24" font-family="Arial, sans-serif">Compare airfare timing, first-night friction, and city rhythm.</text>
  </g>

  <path d="M560 496C708 432 852 422 970 452C1088 480 1188 532 1368 516" stroke="url(#route)" stroke-width="10" stroke-linecap="round" stroke-dasharray="16 18"/>
