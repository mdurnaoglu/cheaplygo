    <rect x="962" y="112" width="460" height="256" rx="30" stroke="#E6D4BF"/>
    <text x="1010" y="174" fill="#A05327" font-size="31" font-family="Georgia, serif" font-weight="700">Best Fit by Travel Style</text>
    <text x="1010" y="224" fill="#77492F" font-size="22" font-family="Arial, sans-serif">Dublin: easiest first Europe feel</text>
    <text x="1010" y="260" fill="#77492F" font-size="22" font-family="Arial, sans-serif">Stockholm: calm and efficient flow</text>
    <text x="1010" y="296" fill="#77492F" font-size="22" font-family="Arial, sans-serif">Berlin: strongest total flexibility</text>
  </g>

  <g filter="url(#shadowLarge)">
    <rect x="150" y="502" width="616" height="214" rx="30" fill="#163445"/>
    <rect x="150" y="502" width="616" height="214" rx="30" stroke="#34566A"/>
    <rect x="202" y="548" width="154" height="118" rx="22" fill="#7BA7B8"/>
    <text x="229" y="594" fill="#F7FBFC" font-size="30" font-family="Georgia, serif" font-weight="700">Dublin</text>
    <text x="220" y="631" fill="#F0F7F9" font-size="18" font-family="Arial, sans-serif">Easy landing, compact feel</text>
    <rect x="382" y="548" width="154" height="118" rx="22" fill="#E1BE78"/>
    <text x="396" y="594" fill="#5E4317" font-size="29" font-family="Georgia, serif" font-weight="700">Stockholm</text>
    <text x="405" y="631" fill="#674A1C" font-size="18" font-family="Arial, sans-serif">Order, transit, late-summer logic</text>
    <rect x="562" y="548" width="154" height="118" rx="22" fill="#D27A4A"/>
    <text x="595" y="594" fill="#FFF8F2" font-size="30" font-family="Georgia, serif" font-weight="700">Berlin</text>
    <text x="578" y="631" fill="#FFF1E7" font-size="18" font-family="Arial, sans-serif">Neighborhood and hotel range</text>
  </g>

  <g filter="url(#shadowPanel)">
    <rect x="1038" y="470" width="412" height="228" rx="30" fill="#F8FBFC"/>
    <rect x="1038" y="470" width="412" height="228" rx="30" stroke="#CEE1E5"/>
    <text x="1084" y="528" fill="#1E6F80" font-size="30" font-family="Georgia, serif" font-weight="700">Smarter Total Value</text>
    <text x="1084" y="574" fill="#345259" font-size="21" font-family="Arial, sans-serif">Airfare alone is not enough.</text>
    <text x="1084" y="608" fill="#345259" font-size="21" font-family="Arial, sans-serif">First-night sleep, transit, and</text>
    <text x="1084" y="642" fill="#345259" font-size="21" font-family="Arial, sans-serif">usable sightseeing hours decide more.</text>
  </g>

  <g opacity="0.94">
