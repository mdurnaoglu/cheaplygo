    <path d="M930 456L969 431L1022 439L988 466L1046 494L1031 510L971 490L954 536L932 530L939 482L898 486L890 468L930 456Z" fill="#FFFDF9"/>
  </g>

  <g filter="url(#shadowPanel)">
