    <text x="233" y="624" fill="#FFF7F1" font-size="18" font-family="Arial, sans-serif">Compact, scenic, easy</text>
    <rect x="388" y="542" width="148" height="112" rx="22" fill="#F1C27D"/>
    <text x="408" y="588" fill="#5E390F" font-size="29" font-family="Georgia, serif" font-weight="700">Valencia</text>
    <text x="414" y="624" fill="#6C4A1C" font-size="18" font-family="Arial, sans-serif">Beach + city mix</text>
    <rect x="562" y="542" width="148" height="112" rx="22" fill="#7DA0A8"/>
    <text x="586" y="588" fill="#F7FAFB" font-size="29" font-family="Georgia, serif" font-weight="700">Bologna</text>
    <text x="591" y="624" fill="#EAF2F4" font-size="18" font-family="Arial, sans-serif">Food + rail logic</text>
  </g>

