    <text x="1088" y="608" fill="#36525A" font-size="21" font-family="Arial, sans-serif">Central hotel, transfers, and</text>
    <text x="1088" y="642" fill="#36525A" font-size="21" font-family="Arial, sans-serif">usable sightseeing hours matter.</text>
  </g>

  <g filter="url(#cardShadow)">
