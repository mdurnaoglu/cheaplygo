    <text x="382" y="300" fill="#FFF8F3" font-size="23" font-family="Arial, sans-serif" font-weight="700">Hotel Value</text>
    <text x="154" y="354" fill="#243746" font-size="24" font-family="Arial, sans-serif">Compare flight friction, hotel pressure, and trip rhythm.</text>
  </g>

