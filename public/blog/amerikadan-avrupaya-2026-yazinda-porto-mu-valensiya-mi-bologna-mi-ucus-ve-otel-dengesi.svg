    <text x="1002" y="176" fill="#9E4E24" font-size="30" font-family="Georgia, serif" font-weight="700">Best Fit by Travel Style</text>
    <text x="1002" y="224" fill="#7B4B30" font-size="22" font-family="Arial, sans-serif">Porto: scenery and low city friction</text>
    <text x="1002" y="260" fill="#7B4B30" font-size="22" font-family="Arial, sans-serif">Valencia: beach plus city balance</text>
    <text x="1002" y="296" fill="#7B4B30" font-size="22" font-family="Arial, sans-serif">Bologna: food and rail flexibility</text>
  </g>

