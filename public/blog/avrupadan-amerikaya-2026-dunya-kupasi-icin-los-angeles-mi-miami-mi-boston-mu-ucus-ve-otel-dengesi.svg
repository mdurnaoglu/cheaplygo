    <text x="1002" y="260" fill="#7B4B30" font-size="22" font-family="Arial, sans-serif">Miami: match plus vacation energy</text>
    <text x="1002" y="298" fill="#7B4B30" font-size="22" font-family="Arial, sans-serif">Boston: compact short-trip logic</text>
    <text x="1002" y="336" fill="#7B4B30" font-size="22" font-family="Arial, sans-serif">Think in nights, not airfare alone.</text>
