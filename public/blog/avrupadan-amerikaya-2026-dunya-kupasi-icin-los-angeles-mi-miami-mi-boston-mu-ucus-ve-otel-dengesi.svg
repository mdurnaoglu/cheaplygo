    <text x="426" y="592" fill="#6B481A" font-size="28" font-family="Georgia, serif" font-weight="700">Miami</text>
    <text x="410" y="626" fill="#6B481A" font-size="18" font-family="Arial, sans-serif">Beach plus football</text>
    <rect x="566" y="546" width="152" height="112" rx="22" fill="#7AA7B1"/>
    <text x="605" y="592" fill="#F8FBFC" font-size="28" font-family="Georgia, serif" font-weight="700">Boston</text>
    <text x="585" y="626" fill="#EAF3F5" font-size="18" font-family="Arial, sans-serif">Shortest clean break</text>
